<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --sand:#A4D8FF;
    --grey:#35393C;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{width:1080px; height:1920px; overflow:hidden}
  body{
    font-family:"Archivo",sans-serif; background:var(--sand); color:var(--grey);
    display:flex; flex-direction:column;
    -webkit-font-smoothing:antialiased;
  }

  /* header */
  .top{padding:130px 80px 0; display:flex; align-items:flex-start; gap:34px}
  .logo{width:110px; height:110px; border-radius:50%; border:3px solid var(--grey); background:#fff; object-fit:cover; flex:0 0 auto; margin-top:10px}
  .eyebrow{font-size:26px; font-weight:700; letter-spacing:.3em; text-transform:uppercase; margin-bottom:22px}
  h1{font-family:"Archivo Black",sans-serif; font-weight:400; text-transform:uppercase;
     font-size:118px; line-height:.9; letter-spacing:-.01em}
  h1 .outline{color:transparent; -webkit-text-stroke:4px var(--grey)}

  /* ticker */
  .ticker{background:var(--grey); color:var(--sand); padding:24px 0; margin-top:52px;
    white-space:nowrap; overflow:hidden; text-align:center}
  .ticker span{font-family:"Archivo Black",sans-serif; font-size:29px; letter-spacing:.1em;
    text-transform:uppercase; padding:0 20px}

  /* photos */
  .photos{display:flex; justify-content:center; gap:44px; padding:64px 60px 6px}
  .frame{width:420px; height:420px; border:3px solid var(--grey); border-radius:26px; overflow:hidden; background:#fff}
  .frame img{width:100%; height:100%; object-fit:cover; display:block}
  .frame.a{transform:rotate(-2.4deg)}
  .frame.b{transform:rotate(2deg); margin-top:26px}

  /* stat */
  .mid{flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:0 80px}
  .big{font-family:"Archivo Black",sans-serif; font-size:300px; line-height:1;
    color:transparent; -webkit-text-stroke:6px var(--grey); letter-spacing:-.02em}
  .mid .lab{font-family:"Archivo Black",sans-serif; font-size:56px; text-transform:uppercase; margin-top:4px}
  .mid .cta{margin-top:46px; background:var(--grey); color:var(--sand); border-radius:999px;
    font-family:"Archivo Black",sans-serif; font-size:38px; text-transform:uppercase; letter-spacing:.04em;
    padding:32px 62px}
  .mid .hint{margin-top:22px; font-size:28px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; opacity:.65}

  /* footer */
  .foot{background:var(--grey); color:var(--sand); padding:42px 80px 52px; text-align:center}
  .facts{font-family:"Archivo Black",sans-serif; font-size:29px; text-transform:uppercase; letter-spacing:.05em; line-height:1.7}
  .handle{font-size:29px; font-weight:700; margin-top:16px; letter-spacing:.12em; opacity:.85}
</style>
</head>
<body>

  <div class="top">
    <img class="logo" src="../img/planet-circle.jpg" alt="Planet Circle" />
    <div>
      <p class="eyebrow">Planet Circle predstavlja</p>
      <h1>Techno Volley <span class="outline">'26</span></h1>
    </div>
  </div>

  <div class="ticker">
    <span>22. avgust</span><span>✦</span><span>13.00</span><span>✦</span><span>ŠP Budanje</span>
  </div>

  <div class="photos">
    <div class="frame a"><img src="../img/1000136442.jpg" alt="" /></div>
    <div class="frame b"><img src="../img/1000136443.jpg" alt="" /></div>
  </div>

  <div class="mid">
    <div class="big">1/3</div>
    <div class="lab">mest je že zasedenih</div>
    <div style="margin-top:46px; width:560px; height:130px; border:4px solid var(--grey); border-radius:999px"></div>
    <div class="hint">→ link do prijav</div>
  </div>

  <div class="foot">
    <div class="facts">30 € na ekipo ✦ 3 igralci<br>zmagovalna ekipa pobere 50 % prijavnin</div>
    <div class="handle">@planetcircle__</div>
  </div>

</body>
</html>
